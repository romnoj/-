env:
  TERM: xterm-256color

# Inform emulator of our shell choice.
shell:
  program: /usr/local/bin/fish
  args:
    - --login

## Window Settings

window:
  dimensions:
    columns: 90
    lines: 40
  position:
    x: 965
    y: 390
  padding:
    x: 20
    y: 20
  decorations: buttonless
  dynamic_title: true
  dynamic_padding: true
  startup_mode: Windowed
  option_as_alt: OnlyLeft

scrolling:
  history: 100000
  multiplier: 3

mouse:
  hide_when_typing: true

cursor:
  style: 
    shape: Block
    blinking: Always
  blink_interval: 500
  unfocused_hollow: true
  thickness: 0.15

live_config_reload: true
draw_bold_text_with_bright_colors: true

## Font Settings

font:
  normal:
    family: Berkeley Mono
    style: Regular

  bold:
    family: Berkeley Mono 
    style: Bold 

  italic:
    family: Berkeley Mono 
    style: Italic

  bold_italic:
    family: Berkeley Mono 
    style: Bold Italic

  size: 12

  offset:
    x: 1 # Character spacing.
    y: 8 # Line spacing.

  glyph_offset:
    x: 0
    y: 4

## Color Settings

colors:
  primary:
    background: '0x021012'
    foreground: '0x095b67'

  cursor:
    text: CellBackground
    cursor: CellForeground

  normal:
    black:   '0x021012'
    red:     '0x16c1d9'
    green:   '0x4dd0e1'
    yellow:  '0x80deea'
    blue:    '0x00bcd4'
    magenta: '0x00acc1'
    cyan:    '0x26c6da'
    white:   '0x095b67'

  bright:
    black:   '0x052e34'
    red:     '0x16c1d9'
    green:   '0x4dd0e1'
    yellow:  '0x80deea'
    blue:    '0x00bcd4'
    magenta: '0x00acc1'
    cyan:    '0x26c6da'
    white:   '0x109cb0'

  indexed_colors:
    - { index: 16, color: '0xb3ebf2' }
    - { index: 17, color: '0x0097a7' }
    - { index: 18, color: '0x031619' }
    - { index: 19, color: '0x041f23' }
    - { index: 20, color: '0x064048' }
    - { index: 21, color: '0x0c7c8c' }

selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"
  save_to_clipboard: true

