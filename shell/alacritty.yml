env:
  TERM: xterm-256color

shell:
  program: /usr/local/bin/fish
  args:
    - -l

live_config_reload: true

window:
  dimensions:
    columns: 90
    lines: 40
  position:
    x: 965
    y: 390
  padding:
    x: 15
    y: 15
  decorations: buttonless
  dynamic_padding: true
  opacity: 0.93
  option_as_alt: OnlyLeft
  startup_mode: Windowed

scrolling:
  history: 100000
  multiplier: 2

font:
  normal:
    family: BerkeleyMono Nerd Font Mono
    style: Regular

  bold:
    family: BerkeleyMono Nerd Font Mono
    style: Bold 

  italic:
    family: BerkeleyMono Nerd Font Mono
    style: Italic

  bold_italic:
    family: BerkeleyMono Nerd Font Mono
    style: Bold Italic

  size: 11.5

  offset:
    x: 1 # Character spacing
    y: 1 # Line spacing

  builtin_box_drawing: true

colors:
  primary:
    foreground: '0xebdbb2'
    background: '0x1d2021'

  normal:
    black:   '0x282828'
    red:     '0xcc241d'
    green:   '0x98971a'
    yellow:  '0xd79921'
    blue:    '0x458588'
    magenta: '0xb16286'
    cyan:    '0x689d6a'
    white:   '0xa89984'

  bright:
    black:   '0x928374'
    red:     '0xfb4934'
    green:   '0xb8bb26'
    yellow:  '0xfabd2f'
    blue:    '0x83a598'
    magenta: '0xd3869b'
    cyan:    '0x8ec07c'
    white:   '0xebdbb2'

  transparent_background_colors: true
  draw_bold_text_with_bright_colors: true

selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>t"
  save_to_clipboard: true

cursor:
  style: 
    shape: Block
    blinking: Always
  blink_interval: 600
  unfocused_hollow: true
  thickness: 0.10

mouse:
  hide_when_typing: true
