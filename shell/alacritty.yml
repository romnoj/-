env:
  TERM: xterm-256color

shell:
  program: /usr/local/bin/fish
  args:
    - -l

live_config_reload: true

window:
  dimensions:
    columns: 90
    lines: 40
  position:
    x: 965
    y: 390
  padding:
    x: 15
    y: 15
  decorations: buttonless
  dynamic_padding: true
  opacity: 0.97
  option_as_alt: OnlyLeft
  startup_mode: Windowed

scrolling:
  history: 100000
  multiplier: 2

font:
  normal:
    family: BerkeleyMono Nerd Font Mono
    style: Regular

  bold:
    family: BerkeleyMono Nerd Font Mono
    style: Bold 

  italic:
    family: BerkeleyMono Nerd Font Mono
    style: Italic

  bold_italic:
    family: BerkeleyMono Nerd Font Mono
    style: Bold Italic

  size: 11.5

  offset:
    x: 1 # Character spacing
    y: 1 # Line spacing

  builtin_box_drawing: true

colors:
  primary:
      background: "#1c1917"
      foreground: "#d6d0cd"
      dim_foreground: "#d6d0cd"
      bright_foreground: "#d6d0cd"

  cursor:
      text: "#1c1917"
      cursor: "#d6d0cd"
  vi_mode_cursor:
      text: "#1c1917"
      cursor: "#d6d0cd"

  search:
      matches:
          foreground: "#1c1917"
          background: "#24201e"
      focused_match:
          foreground: "#1c1917"
          background: "#2a2522"
      footer_bar:
          foreground: "#1c1917"
          background: "#b8aea8"

  hints:
      start:
          foreground: "#1c1917"
          background: "#c4b392"
      end:
          foreground: "#1c1917"
          background: "#24201e"

  selection:
      text: "#d6d0cd"
      background: "#2a2522"

  normal:
      black: "#2a2421"
      red: "#d49191"
      green: "#b6b696"
      yellow: "#c4b392"
      blue: "#9e96b6"
      magenta: "#b696b1"
      cyan: "#98acc8"
      white: "#ddd9d6"

  bright:
      black: "#2e2622"
      red: "#d89393"
      green: "#b9b99b"
      yellow: "#c8b692"
      blue: "#a299b9"
      magenta: "#b997b4"
      cyan: "#9bb0ca"
      white: "#e1dbd9"

  dim:
      black: "#2a2421"
      red: "#d18989"
      green: "#727246"
      yellow: "#c1b090"
      blue: "#9b92b3"
      magenta: "#b393ad"
      cyan: "#95a9c5"
      white: "#e3d5ce"

  indexed_colors:
      - { index: 16, color: "#c4b392" }
      - { index: 17, color: "#ddd9d6" }

  transparent_background_colors: true
  draw_bold_text_with_bright_colors: true

selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>t"
  save_to_clipboard: true

cursor:
  style: 
    shape: Block
    blinking: Always
  blink_interval: 600
  unfocused_hollow: true
  thickness: 0.10

mouse:
  hide_when_typing: true
